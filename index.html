<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Journey of Love</title>
    <style>
        body { background: #222; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Press Start 2P', cursive; }
        canvas { background: #3d3d3d; border: 5px solid #ffb6c1; image-rendering: pixelated; }
    </style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>
<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

// Khởi tạo ảnh
function createImg(src) {
    let i = new Image(); i.src = src;
    i.onerror = () => console.log("Lỗi: Không tìm thấy file " + src);
    return i;
}

let idleImg = createImg("1.png");
let hit1Img = createImg("2.png");
let hit2Img = createImg("3.png");
let planeImg = createImg("plane.png"); 
let girlRealImg = createImg("girl_real.png");
let girlTroll1Img = createImg("girl_troll1.png");
let girlTroll2Img = createImg("girl_troll2.png");
let girlTroll3Img = createImg("girl_troll3.png");

// Biến logic
let scene = 1, money = 0, animTime = 0, particles = [], targetMoney = 10;
let planeY = 250, planeV = 0, gravity = 0.4, obstacles = [], progress = 0, gameOverM2 = false;
let girls = [], feedbackText = "", feedbackTime = 0;
let boyX = 50, girlX = 650, hearts = [], met = false;

function initMiniGame() {
    girls = [];
    let correct = Math.floor(Math.random() * 4);
    let trolls = [girlTroll1Img, girlTroll2Img, girlTroll3Img].sort(() => Math.random() - 0.5);
    let tCount = 0;
    for(let i=0; i<4; i++) {
        let isR = (i === correct);
        girls.push({ x: 80 + i * 180, y: 200, w: 140, h: 200, img: isR ? girlRealImg : trolls[tCount++], isReal: isR });
    }
}

canvas.addEventListener("mousedown", (e) => {
    let rect = canvas.getBoundingClientRect();
    let mx = e.clientX - rect.left;
    let my = e.clientY - rect.top;
    if (scene === 1) {
        money++; animTime = 12;
        for(let i=0; i<5; i++) particles.push({x: 400, y: 300, sx: (Math.random()-0.5)*10, sy: (Math.random()-1)*10, life: 1});
        if (money >= targetMoney) scene = 2;
    } else if (scene === 2) {
        if (gameOverM2) { planeY = 250; planeV = 0; obstacles = []; progress = 0; gameOverM2 = false; }
        else planeV = -8;
    } else if (scene === 2.5) {
        girls.forEach(g => {
            if (mx > g.x && mx < g.x+g.w && my > g.y && my < g.y+g.h) {
                if (g.isReal) { feedbackText = "RIGHT! 💖"; feedbackTime = 40; setTimeout(()=>scene=3, 800); }
                else { feedbackText = "WRONG! 😭"; feedbackTime = 40; }
            }
        });
    }
});

function draw() {
    ctx.clearRect(0, 0, 800, 500);
    ctx.font = "12px 'Press Start 2P'";
    if (scene === 1) {
        ctx.fillStyle = "white"; ctx.fillText("MONEY: " + money + "/" + targetMoney, 30, 50);
        particles.forEach((p, i) => {
            ctx.globalAlpha = p.life; ctx.fillStyle = "cyan"; ctx.fillRect(p.x, p.y, 5, 5);
            p.x += p.sx; p.y += p.sy; p.sy += 0.4; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;
        let img = (animTime > 8) ? hit1Img : (animTime > 0) ? hit2Img : idleImg;
        if (img.complete && img.naturalWidth !== 0) ctx.drawImage(img, 310, 250, 180, 180);
        else { ctx.fillStyle = "blue"; ctx.fillRect(350, 300, 100, 100); }
        if (animTime > 0) animTime--;
    } else if (scene === 2) {
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, 800, 500);
        if (!gameOverM2) {
            planeV += gravity; planeY += planeV; progress += 0.3;
            if (Math.random() < 0.03) obstacles.push({x: 800, y: Math.random()*400, w: 80, h: 40});
            obstacles.forEach((o, i) => {
                o.x -= 5; ctx.fillStyle = "white"; ctx.fillRect(o.x, o.y, o.w, o.h);
                if (o.x < 180 && o.x+o.w > 80 && o.y < planeY+60 && o.y+o.h > planeY+20) gameOverM2 = true;
                if (o.x < -100) obstacles.splice(i, 1);
            });
            if (planeY > 450 || planeY < -50) gameOverM2 = true;
            if (progress >= 100) { scene = 2.5; initMiniGame(); }
        }
        if (planeImg.complete && planeImg.naturalWidth !== 0) ctx.drawImage(planeImg, 80, planeY, 120, 80);
        else { ctx.fillStyle = "white"; ctx.fillRect(80, planeY, 80, 50); }
        ctx.fillStyle = "white"; ctx.fillText("GO TO HER: " + Math.floor(progress) + "%", 30, 50);
        if (gameOverM2) ctx.fillText("CRASHED! CLICK TO RETRY", 200, 250);
    } else if (scene === 2.5) {
        ctx.fillStyle = "#222"; ctx.fillRect(0, 0, 800, 500);
        ctx.fillStyle = "white"; ctx.fillText("WHO IS YOUR GIRL?", 250, 80);
        if (feedbackTime > 0) { ctx.fillText(feedbackText, 350, 140); feedbackTime--; }
        girls.forEach(g => {
            if (g.img.complete && g.img.naturalWidth !== 0) ctx.drawImage(g.img, g.x, g.y, g.w, g.h);
            else { ctx.fillStyle = "pink"; ctx.fillRect(g.x, g.y, g.w, g.h); }
        });
    } else if (scene === 3) {
        ctx.fillStyle = "#ffb6c1"; ctx.fillRect(0, 0, 800, 500);
        if (!met) { boyX += 2; girlX -= 2; if (boyX >= girlX - 100) met = true; }
        else {
            if (Math.random() < 0.1) hearts.push({x: boyX+60, y: 250, sx: (Math.random()-0.5)*5, sy: -4, life: 1});
            ctx.fillStyle = "white"; ctx.fillText("FINALLY! 💖", 330, 150);
        }
        if (idleImg.complete) ctx.drawImage(idleImg, boyX, 260, 140, 140);
        if (girlRealImg.complete) ctx.drawImage(girlRealImg, girlX, 280, 100, 140);
        hearts.forEach((h, i) => {
            ctx.globalAlpha = h.life; ctx.fillStyle = "red"; ctx.fillText("❤", h.x, h.y);
            h.x += h.sx; h.y += h.sy; h.life -= 0.02; if(h.life <= 0) hearts.splice(i, 1);
        });
        ctx.globalAlpha = 1;
    }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
