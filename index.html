<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>LOVE✈️💖</title>
    <style>
        body { background: #222; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Press Start 2P', cursive; }
        canvas { background: #3d3d3d; border: 5px solid #ffb6c1; image-rendering: pixelated; cursor: pointer; position: relative; z-index: 1; }
        
        /* CSS CHO POP-UP ẢNH THẬT */
        #popup-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; cursor: pointer;
        }
        #popup-content {
            background: white; padding: 15px; border-radius: 20px; border: 8px solid #ffb6c1;
            text-align: center; max-width: 80%; animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #popup-img { max-width: 100%; max-height: 70vh; border-radius: 10px; display: block; margin: 0 auto 15px; }
        #popup-text { color: #ff69b4; font-size: 14px; line-height: 1.5; text-transform: uppercase; }
        @keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="popup-overlay" onclick="this.style.display='none'">
        <div id="popup-content">
            <img id="popup-img" src="together.png" alt="Together Forever">
            <div id="popup-text">HAPPY BIRTHDAY TOGETHER💖<br><br><span style="font-size:8px;">(Click anywhere to close)</span></div>
        </div>
    </div>

    <canvas id="game" width="800" height="500"></canvas>

<script>
    const romanticMusic = new Audio("romantic.mp3");
romanticMusic.loop = true;
let musicStarted = false; // Thêm cái chốt phụ này cho má
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");
let flagImg = new Image(); flagImg.src = "flag.png";
let keys = {}; // Biến để lưu trạng thái nhấn phím

// Lắng nghe sự kiện bàn phím
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

// ===== 1. TÀI NGUYÊN (NHỚ UP ĐỦ 10 FILE ẢNH & 1 FILE NHẠC) =====
let idleImg = new Image(); idleImg.src = "1.png";
let hit1Img = new Image(); hit1Img.src = "2.png";
let hit2Img = new Image(); hit2Img.src = "3.png";
let planeImg = new Image(); planeImg.src = "plane.png";
let girlRealImg = new Image(); girlRealImg.src = "girl_real.png";
let girlTroll1Img = new Image(); girlTroll1Img.src = "girl_troll1.png";
let girlTroll2Img = new Image(); girlTroll2Img.src = "girl_troll2.png";
let girlTroll3Img = new Image(); girlTroll3Img.src = "girl_troll3.png";
// --- KHAI BÁO 2 ẢNH FLAG ĐỂ CHUYỂN ĐỘNG ---
let flag1Img = new Image(); flag1Img.src = "flag1.png";
let flag2Img = new Image(); flag2Img.src = "flag2.png";
let flagAnimTime = 0; // Cực kỳ quan trọng, thiếu cái này là game đứng hình!
// --- KHAI BÁO ẢNH BACKGROUND (NHỚ ĐÚNG TÊN FILE TRÊN GITHUB) ---
let bg1Img = new Image(); bg1Img.src = "bg1.jpg";
let bg2Img = new Image(); bg2Img.src = "bg2.jpg";
let bg25Img = new Image(); bg25Img.src = "bg2_5.jpg";
let bg3Img = new Image(); bg3Img.src = "bg3.jpg";
// --- ÂM THANH ---
let hitSound = new Audio("hit.mp3");


// --- 2 ẢNH MỚI TOANH CHO MÀN CUỐI (BOY FINAL & GIRL FINAL) ---
let boyFinalImg = new Image(); boyFinalImg.src = "boy_final.png";
let girlFinalImg = new Image(); girlFinalImg.src = "girl_final.png";

// ===== 2. BIẾN GAME =====
let scene = 1, money = 0, animTime = 0, particles = [], targetMoney = 10;
let planeY = 250, planeV = 0, gravity = 0.4, obstacles = [], progress = 0, gameOverM2 = false;
let girls = [], feedbackText = "", feedbackTime = 0;
let boyX = 50, girlX = 650, hearts = [], met = false;
let hasShowedPopup = false;

function initMiniGame() {
    girls = [];
    let correct = Math.floor(Math.random() * 4);
    let trolls = [girlTroll1Img, girlTroll2Img, girlTroll3Img].sort(() => Math.random() - 0.5);
    let tCount = 0;
    for(let i=0; i<4; i++) {
        let isR = (i === correct);
        girls.push({ x: 80 + i * 180, y: 200, w: 140, h: 200, img: isR ? girlRealImg : trolls[tCount++], isReal: isR });
    }
}

function resetM2() {
    planeY = 250;
    planeX = 80; // Reset cả vị trí X
    obstacles = [];
    progress = 0;
    gameOverM2 = false;
}

// ===== 3. XỬ LÝ CLICK =====
canvas.addEventListener("mousedown", (e) => {
    let rect = canvas.getBoundingClientRect();
    let mx = e.clientX - rect.left, my = e.clientY - rect.top;

    if (scene === 1) {
        money++; animTime = 12;
        hitSound.currentTime = 0; hitSound.play().catch(()=>{}); // Chạy âm thanh
        for(let i=0; i<6; i++) particles.push({x: 400, y: 300, sx: (Math.random()-0.5)*12, sy: (Math.random()-1)*15, life: 1});
        if (money >= targetMoney) scene = 2;
    } else if (scene === 2) {
        if (gameOverM2) resetM2();
        else planeV = -8;
    } else if (scene === 2.5) {
        girls.forEach(g => {
            if (mx > g.x && mx < g.x+g.w && my > g.y && my < g.y+g.h) {
                if (g.isReal) { feedbackText = "THAT'S RIGHT! LOVE YA💖"; feedbackTime = 60; setTimeout(()=>scene=3, 1000); }
                else { feedbackText = "WRONG! 😭 REPICK!"; feedbackTime = 60; }
            }
        });
    }
});
// ===== 4. VÒNG LẶP VẼ CHÍNH =====
function draw() {
    ctx.clearRect(0, 0, 800, 500);
    ctx.font = "12px 'Press Start 2P'";

    // --- MÀN 1: ĐÀO TIỀN ---
    if (scene === 1) {
        // --- VẼ BACKGROUND 1 (THAY CHO MÀU #222) ---
        if (bg1Img.complete) ctx.drawImage(bg1Img, 0, 0, 800, 500);
        else { ctx.fillStyle = "#222"; ctx.fillRect(0, 0, 800, 500); } // Dự phòng nếu lỗi ảnh

        ctx.fillStyle = "gold"; ctx.fillText("MONEY: $" + money + " / " + targetMoney, 30, 50);
        ctx.fillStyle = "white"; ctx.fillText("CLICK TO WORK FOR THE TICKET!", 180, 120);
        // ... (phần vẽ particles và nhân vật đào tiền giữ nguyên) ...
        particles.forEach((p, i) => {
            ctx.globalAlpha = p.life; ctx.fillStyle = "cyan"; ctx.fillRect(p.x, p.y, 8, 8);
            p.x += p.sx; p.y += p.sy; p.sy += 0.5; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;
        let img = (animTime > 8) ? hit1Img : (animTime > 0) ? hit2Img : idleImg;
        if (img.complete) ctx.drawImage(img, 310, 250, 180, 180);
        else { ctx.fillStyle = "blue"; ctx.fillRect(350, 280, 100, 150); }
        if (animTime > 0) animTime--;
    }

    // --- MÀN 2: BAY ---
    else if (scene === 2) {
        // 1. Vẽ nền
        if (bg2Img.complete) ctx.drawImage(bg2Img, 0, 0, 800, 500);
        else { ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, 800, 500); }

        if (!gameOverM2) {
            progress += 0.2; 

            // Đảm bảo planeX có giá trị khởi đầu
            if (typeof planeX === 'undefined') planeX = 80;

            // 2. ĐIỀU KHIỂN
            if (keys["ArrowUp"] || keys["KeyW"]) planeY -= 5;
            if (keys["ArrowDown"] || keys["KeyS"]) planeY += 5;
            if (keys["ArrowLeft"] || keys["KeyA"]) planeX = Math.max(0, planeX - 5);
            if (keys["ArrowRight"] || keys["KeyD"]) planeX = Math.min(600, planeX + 5);

            if (planeY < 0) planeY = 0;
            if (planeY > 440) planeY = 440;

            // 3. TẠO MÂY
            if (progress < 90 && Math.random() < 0.04) {
                obstacles.push({x: 800, y: Math.random() * 450, w: 90, h: 50});
            }

            // 4. XỬ LÝ MÂY & VA CHẠM
            obstacles.forEach((o, i) => {
                o.x -= 6;
                ctx.fillStyle = "rgba(255,255,255,0.8)";
                ctx.fillRect(o.x, o.y, o.w, o.h);

                if (o.x < planeX + 100 && o.x + o.w > planeX + 20 && o.y < planeY + 60 && o.y + o.h > planeY + 20) {
                    gameOverM2 = true;
                }
                if (o.x < -100) obstacles.splice(i, 1);
            });

            // 5. XUẤT HIỆN CỜ KHI GẦN VỀ ĐÍCH (95%)
            if (progress >= 95) {
                let flagX = 800 - (progress - 95) * 150; // Tăng tốc độ cờ chạy ra cho rõ
                
                if (typeof flagAnimTime !== 'undefined') flagAnimTime++; 
                else flagAnimTime = 0;

                let currentFlagImg = (Math.floor(flagAnimTime / 15) % 2 === 0) ? flag1Img : flag2Img;

                if (currentFlagImg.complete && currentFlagImg.naturalWidth !== 0) {
                    ctx.drawImage(currentFlagImg, flagX, 150, 120, 120);
                } else {
                    ctx.fillStyle = "red"; ctx.fillRect(flagX, 150, 10, 100);
                    ctx.fillStyle = "white"; ctx.fillText("🚩", flagX + 15, 180);
                }

                // Chạm cờ để qua màn (Đầu máy bay chạm cột cờ)
                if (flagX <= planeX + 100) {
                    scene = 2.5;
                    initMiniGame();
                }
            }
        }

        // 6. VẼ MÁY BAY
        ctx.save();
        if (gameOverM2) ctx.globalAlpha = 0.5;
        ctx.drawImage(planeImg, (typeof planeX !== 'undefined' ? planeX : 80), planeY, 120, 80);
        ctx.restore();

        // 7. UI
        ctx.fillStyle = "white";
        ctx.fillText("DISTANCE: " + Math.floor(progress) + "%", 30, 50);
        if (gameOverM2) {
            ctx.fillStyle = "red"; ctx.fillText("CRASHED! CLICK TO RETRY", 200, 250);
        } else {
            ctx.fillText("USE ARROWS TO FLY! ⬆️⬇️", 270, 480);
        }
    }

    // --- MÀN 2.5: CHỌN BẠN GÁI ---
    else if (scene === 2.5) {
        // --- VẼ BACKGROUND 2.5 (THAY CHO MÀU #222) ---
        if (bg25Img.complete) ctx.drawImage(bg25Img, 0, 0, 800, 500);
        else { ctx.fillStyle = "#222"; ctx.fillRect(0, 0, 800, 500); }

        ctx.fillStyle = "white"; ctx.fillText("WHO IS YOUR REAL GIRL? 😏", 250, 100);
        if (feedbackTime > 0) {
            ctx.fillStyle = feedbackText.includes("WRONG") ? "#ff4d4d" : "#00ff00";
            ctx.fillText(feedbackText, 250, 150); feedbackTime--;
        }
        girls.forEach(g => { if (g.img.complete) ctx.drawImage(g.img, g.x, g.y, g.w, g.h); });
    }

    // --- MÀN 3: GẶP NHAU ---
    else if (scene === 3) {
        // --- VẼ BACKGROUND 3 (THAY CHO MÀU #ffb6c1) ---
        if (bg3Img.complete) ctx.drawImage(bg3Img, 0, 0, 800, 500);
        else { ctx.fillStyle = "#ffb6c1"; ctx.fillRect(0, 0, 800, 500); }

        if (!met) {
            // ... (phần logic đi bộ lại gần và pop-up giữ nguyên) ...
            boyX += 3; girlX -= 3;
            if (boyX >= girlX - 100) {
                met = true;
                if(!hasShowedPopup) {
                    document.getElementById('popup-overlay').style.display = 'flex';
                    hasShowedPopup = true;
                }
            }
        } else {
            if (Math.random() < 0.2) hearts.push({x: boyX+60, y: 250, sx: (Math.random()-0.5)*8, sy: -5, life: 1});
            ctx.fillStyle = "white"; ctx.fillText("FINALLY MEET 💖", 270, 180);
        }
        if (idleImg.complete) ctx.drawImage(idleImg, boyX, 260, 140, 140);
        if (girlRealImg.complete) ctx.drawImage(girlRealImg, girlX, 280, 100, 140);
        hearts.forEach((h, i) => {
            ctx.globalAlpha = h.life; ctx.fillStyle = "red"; ctx.fillText("❤", h.x, h.y);
            h.x += h.sx; h.y += h.sy; h.life -= 0.02; if(h.life <= 0) hearts.splice(i, 1);
        });
        ctx.globalAlpha = 1;
    }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
