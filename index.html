<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Game 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; overflow: hidden; font-family: 'Press Start 2P', cursive; }
        #game-container { position: relative; border: 4px solid #fff; width: 800px; height: 500px; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* POP-UP: Nằm trên Canvas (z-index: 10) */
        #popup-overlay {
            position: absolute; top: 0; left: 0; width: 800px; height: 500px;
            background: rgba(0, 0, 0, 0.7); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; z-index: 10;
        }
        .popup-content {
            background: #ffb6c1; padding: 30px; border: 5px solid #fff;
            border-radius: 20px; color: #d63384; position: relative;
        }

        /* TRÁI TIM HTML: Phải nằm TRÊN CÙNG (z-index: 999) */
        .final-heart {
            position: absolute; pointer-events: none; z-index: 999;
            animation: finalHeartFly linear forwards;
        }
        @keyframes finalHeartFly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translate(calc(var(--speedX) * 1px), calc(var(--speedY) * 1px)) rotate(var(--rotation)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="game" width="800" height="500"></canvas>
        <div id="popup-overlay">
            <div class="popup-content">
                <h1>💖 HAPPY BIRTHDAY! 💖</h1>
                <img src="together.png" alt="Together" style="max-width: 100%; max-height: 250px; border-radius: 10px; margin-bottom: 20px; border: 3px solid white;">
                <p>Good Boy!<br>Together Forever! 🥰</p>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 1. Khai báo biến
let scene = 0, money = 0, targetMoney = 1000;
let boyX = 50, girlX = 650, met = false;
let isTransition = false, transitionText = "", transitionTimer = 0, typingIdx = 0, nextScene = 1;
let planeY = 250, progress = 0, obstacles = [], gameOverM2 = false;
let heartInterval = null;

// 2. Load hình ảnh (Fix lỗi load ảnh)
const img = {};
const assets = {
    idle: '1.png', hit1: '2.png', hit2: '3.png',
    bg1: 'bg1.jpg', bg2: 'bg2.jpg', bg3: 'bg3.jpg', bg25: 'bg2_5.jpg',
    boyFinal: 'boy_final.png', girlFinal: 'girl_final.png',
    plane: 'plane.png', girlReal: 'girl_real.png'
};
for (let key in assets) { img[key] = new Image(); img[key].src = assets[key]; }

// 3. Hàm tạo tim HTML đè lên Popup
function createFinalHeart() {
    if (!met) return;
    const h = document.createElement('div');
    h.className = 'final-heart';
    const emojis = ['❤️', '💖', '🌹', '💕', '✨'];
    h.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    
    const size = 20 + Math.random() * 30;
    const dur = 2 + Math.random() * 3;
    h.style.left = (Math.random() * 750 + 25) + 'px';
    h.style.bottom = "0px";
    h.style.fontSize = size + "px";
    h.style.setProperty('--speedX', (Math.random() - 0.5) * 400);
    h.style.setProperty('--speedY', -500 - Math.random() * 200);
    h.style.setProperty('--rotation', (Math.random() - 0.5) * 360 + "deg");
    h.style.animationDuration = dur + "s";

    document.getElementById('game-container').appendChild(h);
    setTimeout(() => h.remove(), dur * 1000);
}

// 4. Logic Game
canvas.addEventListener("mousedown", () => {
    if (isTransition) return;
    if (scene === 0) scene = 1;
    else if (scene === 1) {
        money += 50; 
        if (money >= targetMoney) {
            isTransition = true; transitionText = "DI CHOI THOI!"; nextScene = 3; transitionTimer = 100;
        }
    }
});

function draw() {
    ctx.clearRect(0, 0, 800, 500);

    if (isTransition) {
        ctx.fillStyle = "black"; ctx.fillRect(0, 0, 800, 500);
        ctx.fillStyle = "white"; ctx.textAlign = "center";
        ctx.fillText(transitionText, 400, 250);
        transitionTimer--;
        if (transitionTimer <= 0) { isTransition = false; scene = nextScene; }
    } 
    else if (scene === 1) {
        if (img.bg1.complete) ctx.drawImage(img.bg1, 0, 0, 800, 500);
        ctx.fillStyle = "gold"; ctx.fillText("$" + money, 50, 50);
        if (img.idle.complete) ctx.drawImage(img.idle, 220, 150, 300, 300);
    } 
    else if (scene === 3) {
        if (img.bg3.complete) ctx.drawImage(img.bg3, 0, 0, 800, 500);
        if (!met) {
            boyX += 3; girlX -= 3;
            if (boyX >= girlX - 150) {
                met = true;
                document.getElementById('popup-overlay').style.display = 'flex';
                if (!heartInterval) heartInterval = setInterval(createFinalHeart, 100);
            }
        }
        if (img.boyFinal.complete) ctx.drawImage(img.boyFinal, boyX, 200, 200, 200);
        if (img.girlFinal.complete) ctx.drawImage(img.girlFinal, girlX, 200, 200, 200);
    }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
