<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Our Love💖</title>
    <style>
        body { background: #222; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Press Start 2P', cursive; }
        canvas { background: #3d3d3d; border: 5px solid #ffb6c1; image-rendering: pixelated; cursor: pointer; }

        /* CSS POP-UP */
        #popup-overlay {
            display: none; /* Mặc định ẩn */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 9999;
            justify-content: center; align-items: center;
        }
        #popup-content {
            background: white; padding: 20px; border-radius: 20px;
            border: 8px solid #ffb6c1; text-align: center; max-width: 80%;
            animation: popShow 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #popup-img { max-width: 100%; max-height: 60vh; border-radius: 10px; display: block; margin: 0 auto 15px; }
        #popup-text { color: #ff69b4; font-size: 18px; margin-bottom: 10px; }
        @keyframes popShow { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="popup-overlay" onclick="this.style.display='none'">
        <div id="popup-content" onclick="event.stopPropagation()">
            <img id="popup-img" src="together.jpg" onerror="this.src='https://via.placeholder.com/400x300?text=Anh+Loi+Roi+Ma+Oi'">
            <div id="popup-text">TOGETHER FOREVER 💖</div>
            <button onclick="document.getElementById('popup-overlay').style.display='none'" style="font-family:'Press Start 2P'; padding:10px; border:none; background:#ffb6c1; cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <canvas id="game" width="800" height="500"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

// 1. TÀI NGUYÊN
let idleImg = new Image(); idleImg.src = "1.png";
let hit1Img = new Image(); hit1Img.src = "2.png";
let hit2Img = new Image(); hit2Img.src = "3.png";
let planeImg = new Image(); planeImg.src = "plane.png";
let boyFinal = new Image(); boyFinal.src = "boy_final.png";
let girlFinal = new Image(); girlFinal.src = "girl_final.png";
let girlReal = new Image(); girlReal.src = "girl_real.png";
let troll1 = new Image(); troll1.src = "girl_troll1.png";
let troll2 = new Image(); troll2.src = "girl_troll2.png";
let troll3 = new Image(); troll3.src = "girl_troll3.png";

// 2. BIẾN
let scene = 1, money = 0, targetMoney = 10, animTime = 0, particles = [];
let planeY = 250, planeV = 0, gravity = 0.4, obstacles = [], progress = 0, gameOverM2 = false;
let girls = [], feedbackText = "", feedbackTime = 0, boyX = 50, girlX = 650, hearts = [], met = false;

function initMiniGame() {
    girls = [];
    let correct = Math.floor(Math.random() * 4);
    let trolls = [troll1, troll2, troll3].sort(() => Math.random() - 0.5);
    let tIdx = 0;
    for(let i=0; i<4; i++) {
        let isR = (i === correct);
        girls.push({ x: 80+i*180, y: 200, w: 140, h: 200, img: isR?girlReal:trolls[tIdx++], isReal: isR });
    }
}

canvas.addEventListener("mousedown", (e) => {
    let rect = canvas.getBoundingClientRect();
    let mx = e.clientX - rect.left; let my = e.clientY - rect.top;
    if (scene === 1) { money++; animTime = 12; if (money >= targetMoney) scene = 2; }
    else if (scene === 2) { if (gameOverM2) { planeY=250; planeV=0; obstacles=[]; progress=0; gameOverM2=false; } else planeV = -8; }
    else if (scene === 2.5) {
        girls.forEach(g => {
            if (mx > g.x && mx < g.x+g.w && my > g.y && my < g.y+g.h) {
                if (g.isReal) { feedbackText="RIGHT!💖"; feedbackTime=60; setTimeout(()=>scene=3, 1000); }
                else { feedbackText="WRONG!😭"; feedbackTime=60; }
            }
        });
    }
});

function draw() {
    ctx.clearRect(0, 0, 800, 500);
    ctx.font = "12px 'Press Start 2P'";

    if (scene === 1) {
        ctx.fillStyle="gold"; ctx.fillText("MONEY: $"+money, 30, 50);
        let img = (animTime > 8) ? hit1Img : (animTime > 0) ? hit2Img : idleImg;
        if (img.complete) ctx.drawImage(img, 310, 250, 180, 180);
        if (animTime > 0) animTime--;
    } 
    else if (scene === 2) {
        ctx.fillStyle="#87CEEB"; ctx.fillRect(0,0,800,500);
        if (!gameOverM2) {
            planeV += gravity; planeY += planeV; progress += 0.3;
            if (Math.random() < 0.04) obstacles.push({x: 800, y: Math.random()*400, w: 90, h: 50});
            obstacles.forEach((o, i) => {
                o.x -= 6; ctx.fillStyle="white"; ctx.fillRect(o.x, o.y, o.w, o.h);
                if (o.x < 180 && o.x+o.w > 80 && o.y < planeY+60 && o.y+o.h > planeY+20) gameOverM2 = true;
            });
            if (planeY > 450 || planeY < -50) gameOverM2 = true;
            if (progress >= 100) { scene = 2.5; initMiniGame(); }
        }
        if (planeImg.complete) ctx.drawImage(planeImg, 80, planeY, 120, 80);
        if (gameOverM2) ctx.fillText("CRASHED! CLICK TO RETRY", 200, 250);
    } 
    else if (scene === 2.5) {
        ctx.fillStyle="#222"; ctx.fillRect(0,0,800,500);
        ctx.fillStyle="white"; ctx.fillText("WHO IS YOUR GIRL?", 250, 100);
        if (feedbackTime > 0) { ctx.fillText(feedbackText, 350, 150); feedbackTime--; }
        girls.forEach(g => { if (g.img.complete) ctx.drawImage(g.img, g.x, g.y, g.w, g.h); });
    } 
    else if (scene === 3) {
        ctx.fillStyle="#ffb6c1"; ctx.fillRect(0,0,800,500);
        if (!met) {
            boyX += 3; girlX -= 3;
            if (boyX >= girlX - 100) { 
                met = true; 
                document.getElementById('popup-overlay').style.display = 'flex'; // HIỆN POPUP
                console.log("Pop-up triggered!"); 
            }
        } else {
            if (Math.random() < 0.2) hearts.push({x: boyX+70, y: 250, sx: (Math.random()-0.5)*8, sy: -5, life: 1});
            ctx.fillStyle="white"; ctx.fillText("FINALLY! 💖", 330, 150);
        }
        if (boyFinal.complete) ctx.drawImage(boyFinal, boyX, 240, 150, 150);
        if (girlFinal.complete) ctx.drawImage(girlFinal, girlX, 240, 150, 150);
        hearts.forEach((h, i) => {
            ctx.globalAlpha = h.life; ctx.fillStyle = "red"; ctx.fillText("❤", h.x, h.y);
            h.x += h.sx; h.y += h.sy; h.life -= 0.02; if(h.life <= 0) hearts.splice(i, 1);
        });
        ctx.globalAlpha = 1;
    }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
